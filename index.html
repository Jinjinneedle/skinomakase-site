<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>SKINOMAKASE</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Helvetica Neue', 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
    body { background: #fff; color: #111; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
    .viewport { position: relative; width: 100%; height: 100%; overflow: hidden; }
    .background-layer { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 80vmin; height: 80vmin; background-image: url('assets/bottom-layer.png'); background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0; transition: opacity 1.2s ease-out; pointer-events: none; z-index: 0; }
    body.state1 .background-layer { opacity: 0; }
    body.state2 .background-layer { opacity: 0; }
    .blueprint-wrapper { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 100vw; height: 80vh; max-width: 1600px; }
    .blueprint-canvas { position: relative; width: 100%; height: 100%; }
    .logo-wrap { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(1.6); z-index: 50; cursor: pointer; transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .logo-img { display: block; width: 180px; max-width: 18vw; min-width: 140px; height: auto; pointer-events: none; user-select: none; -webkit-user-drag: none; }
    body.state0 .logo-wrap { transform: translate(-50%, -50%) scale(1.6); opacity: 1; }
    body.state1 .logo-wrap { transform: translate(-50%, -50%) scale(1.15); opacity: 0.6; }
    body.state2 .logo-wrap { transform: translate(-50%, -50%) scale(0.85); opacity: 0.3; }
    #linesLayer { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    .connector-line { fill: none; stroke-width: 1; stroke-linecap: round; opacity: 0; transition: all 0.6s ease-out; }
    #itemsLayer { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
    .icon { position: absolute; transform: translate(-50%, -50%) scale(0.25); opacity: 0; width: 5.5vw; min-width: 55px; max-width: 85px; transition: all 0.6s ease-out; pointer-events: auto; cursor: pointer; }
    .icon img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; user-select: none; -webkit-user-drag: none; }
    body.state1 .icon.tier1 { opacity: 0.55; transform: translate(-50%, -50%) scale(1); }
    body.state2 .icon.tier1 { opacity: 0.55; transform: translate(-50%, -50%) scale(1); }
    body.state2 .icon.tier2 { opacity: 0.55; transform: translate(-50%, -50%) scale(1); }
    .icon:hover { opacity: 1 !important; transform: translate(-50%, -50%) scale(1.15); z-index: 100; }
    .icon.headset-icon::after { content: attr(data-track-num); position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-size: 9px; letter-spacing: 2px; color: #888; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .icon.headset-icon:hover::after { opacity: 1; }
    .icon.headset-icon.playing::after { opacity: 1; color: #111; font-weight: 700; }
    .icon.locked { filter: blur(3px) grayscale(0.6); cursor: not-allowed; }
    .icon.locked:hover { transform: translate(-50%, -50%) scale(1) !important; filter: blur(2px) grayscale(0.4); opacity: 0.6 !important; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #fff; padding: 50px 40px; border: 1px solid #f0f0f0; width: 100%; max-width: 420px; text-align: center; animation: modalIn 0.4s ease-out; max-height: 90vh; overflow-y: auto; }
    @keyframes modalIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-content h3 { font-weight: 200; letter-spacing: 4px; margin: 0 0 8px 0; font-size: 1rem; }
    .modal-content .modal-sub { font-size: 10px; color: #999; letter-spacing: 2px; margin-bottom: 28px; text-transform: uppercase; }
    .modal-content input, .modal-content textarea { width: 100%; padding: 14px 4px; margin-bottom: 12px; border: none; border-bottom: 1px solid #ddd; outline: none; font-size: 13px; font-family: inherit; background: transparent; transition: border-color 0.3s; }
    .modal-content input:focus, .modal-content textarea:focus { border-bottom-color: #111; }
    .modal-content textarea { resize: none; min-height: 70px; }
    .modal-content button.primary { width: 100%; padding: 14px; background: #111; color: #fff; border: none; cursor: pointer; margin-top: 24px; letter-spacing: 3px; font-size: 11px; transition: background 0.3s; }
    .modal-content button.primary:hover { background: #333; }
    .modal-content button.primary:disabled { background: #ccc; cursor: not-allowed; }
    .modal-close { font-size: 9px; color: #ccc; margin-top: 24px; cursor: pointer; letter-spacing: 2px; display: inline-block; }
    .modal-close:hover { color: #666; }
    .form-status { font-size: 11px; color: #888; margin-top: 16px; min-height: 16px; letter-spacing: 1px; }
    .form-status.success { color: #2a8c4a; }
    .form-status.error { color: #c33; }
    .globe-container { width: 100%; max-width: 480px; }
    .globe-svg { width: 100%; height: 380px; cursor: grab; display: block; }
    .globe-svg:active { cursor: grabbing; }
    .globe-svg .sphere { fill: #5a0a0a; stroke: #3a0505; stroke-width: 0.5; }
    .globe-svg .graticule { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 0.3; }
    .globe-svg .country { fill: #f5f0e8; stroke: #888; stroke-width: 0.4; }
    .globe-svg .pin-pulse { fill: #fff; animation: pinPulse 1.6s ease-out infinite; }
    @keyframes pinPulse { 0% { r: 3; opacity: 1; } 100% { r: 14; opacity: 0; } }
    .globe-svg .pin-dot { fill: #fff; }
    .drop-info { margin-top: 20px; padding: 16px; background: #fafafa; border-left: 2px solid #111; text-align: left; font-size: 12px; line-height: 1.6; }
    .drop-info .drop-city { font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; text-transform: uppercase; }
    .drop-info .drop-detail { color: #666; font-size: 11px; }

    /* ====================== System Look (Minimal) ====================== */
    .sys-line { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; font-family: 'JetBrains Mono', 'Menlo', 'Consolas', monospace; }
    .sys-line .sys-id { font-size: 13px; font-weight: 700; letter-spacing: 3px; }
    .sys-line .sys-tag { font-size: 10px; color: #999; letter-spacing: 2px; }
    .pickup-info { margin-top: 18px; font-family: 'JetBrains Mono', 'Menlo', 'Consolas', monospace; font-size: 11px; line-height: 1.9; color: #444; text-align: center; letter-spacing: 1px; transition: filter 0.5s; }
    body:not(.marked) .pickup-info { filter: blur(7px); user-select: none; }
    .sys-action { display: block; width: 100%; margin-top: 20px; padding: 12px; background: transparent; border: 1px solid #111; color: #111; cursor: pointer; letter-spacing: 3px; font-size: 10px; font-family: 'JetBrains Mono', 'Menlo', 'Consolas', monospace; transition: all 0.2s; }
    .sys-action:hover { background: #111; color: #fff; }
    body.marked .verify-only { display: none; }
    .acc-block { font-family: 'JetBrains Mono', 'Menlo', 'Consolas', monospace; text-align: left; font-size: 11px; line-height: 1.9; color: #444; letter-spacing: 0.5px; margin-top: 20px; }
    .acc-block .acc-row { display: flex; justify-content: space-between; }
    .acc-block .acc-row > span:first-child { color: #999; text-transform: uppercase; letter-spacing: 1px; font-size: 9px; }

    /* Auth tabs */
    .auth-tabs { display: flex; gap: 0; margin: 16px 0 20px 0; border-bottom: 1px solid #eee; font-family: 'JetBrains Mono', 'Menlo', 'Consolas', monospace; }
    .auth-tab { flex: 1; padding: 10px; font-size: 9px; letter-spacing: 3px; cursor: pointer; color: #999; border-bottom: 1px solid transparent; transition: all 0.2s; text-align: center; }
    .auth-tab.active { color: #111; border-bottom-color: #111; }

    /* Logo button (SUBMIT replaced with SKM logo) */
    .logo-action { display: flex; align-items: center; justify-content: center; width: 100%; margin-top: 20px; padding: 14px; background: transparent; border: 1px solid #111; cursor: pointer; transition: all 0.2s; }
    .logo-action img { width: 28px; height: auto; display: block; opacity: 0.85; transition: opacity 0.2s; }
    .logo-action:hover { background: #111; }
    .logo-action:hover img { filter: invert(1); opacity: 1; }
    .logo-action:disabled { border-color: #ccc; cursor: not-allowed; }
    .logo-action:disabled img { opacity: 0.4; }

    /* Headset playing — subtle shake animation */
    @keyframes headsetShake {
      0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
      25%      { transform: translate(-50%, -50%) rotate(-1.6deg); }
      75%      { transform: translate(-50%, -50%) rotate(1.6deg); }
    }
    .icon.headset-icon.playing {
      opacity: 1 !important;
      animation: headsetShake 1.2s ease-in-out infinite;
    }
    @media (max-width: 600px) {
      .logo-img { width: 100px; min-width: 100px; max-width: 100px; }
      .blueprint-wrapper { width: 100vw; height: 100vh; }
      .icon { width: 11vw; min-width: 42px; max-width: 56px; }
      body.state1 .icon.tier1, body.state2 .icon.tier1, body.state2 .icon.tier2 { opacity: 0.7; }
      .modal-content { padding: 36px 24px; }
      .globe-svg { height: 280px; }
    }
  </style>
</head>
<body class="state0">
  <audio id="sndIntro" src="assets/skm-intro.wav" preload="auto"></audio>
  <audio id="sndOutro" src="assets/skm-outro.wav" preload="auto"></audio>
  <audio id="sndFinalHalf" src="assets/skm-outro-final-0-5.wav" preload="auto"></audio>
  <audio id="sndFinalFull" src="assets/skm-outro-final-1.wav" preload="auto"></audio>
  <audio id="trackAudio" preload="none"></audio>

  <div class="viewport">
    <div class="background-layer"></div>
    <div class="blueprint-wrapper">
      <div class="blueprint-canvas" id="canvas">
        <div class="logo-wrap" id="logoWrap"><img src="assets/logo.png" alt="SKM" class="logo-img" /></div>
        <svg id="linesLayer" width="100%" height="100%"></svg>
        <div id="itemsLayer"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="gloveModal">
    <div class="modal-content globe-container">
      <div class="sys-line">
        <span class="sys-id">STG-01</span>
        <span class="sys-tag">softunit</span>
      </div>
      <svg id="globeSvg" class="globe-svg" viewBox="0 0 400 400"></svg>
      <div class="pickup-info" id="pickupInfo">
        <div>SEOUL</div>
        <div>N.SEOUL.TWR L2</div>
        <div>37.5512N 126.9882E</div>
      </div>
      <button class="sys-action verify-only" id="gloveVerify">REQUEST ACCESS</button>
      <span class="modal-close" id="gloveClose">close</span>
    </div>
  </div>

  <div class="modal-overlay" id="tattooModal">
    <div class="modal-content">
      <div class="sys-line">
        <span class="sys-id">MARKED</span>
        <span class="sys-tag">new mark</span>
      </div>
      <input type="text" id="tatName" placeholder="name" />
      <input type="email" id="tatEmail" placeholder="email" />
      <input type="text" id="tatLoc" placeholder="city" />
      <textarea id="tatDesc" placeholder="idea / size / placement"></textarea>
      <button class="sys-action" id="tatSubmit">SEND</button>
      <div class="form-status" id="tatStatus"></div>

    </div>
  </div>

  <div class="modal-overlay" id="accModal">
    <div class="modal-content">
      <div class="sys-line">
        <span class="sys-id">DGTG-01</span>
        <span class="sys-tag">silver 925</span>
      </div>
      <div class="acc-block">
        <div class="acc-row"><span>by</span><span>@4th_death × @skinomakase</span></div>
        <div class="acc-row"><span>status</span><span>pending drop</span></div>
      </div>
      <span class="modal-close" id="accClose">close</span>
    </div>
  </div>

  <div class="modal-overlay" id="authModal">
    <div class="modal-content">
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="request">REQUEST</div>
        <div class="auth-tab" data-tab="enter">CODE</div>
      </div>

      <div class="auth-pane" id="pane-request">
        <input type="text" id="reqName" placeholder="name" />
        <input type="email" id="reqEmail" placeholder="email" />
        <input type="file" id="reqPhoto" accept="image/*" style="font-size:11px; padding:10px 4px;" />
        <textarea id="reqNote" placeholder="when / where was the mark"></textarea>
        <button class="logo-action" id="doRequest" aria-label="submit"><img src="assets/logo.png" alt="" /></button>
        <div class="form-status" id="reqStatus"></div>
      </div>

      <div class="auth-pane" id="pane-enter" style="display:none;">
        <input type="text" id="codeInput" placeholder="access code" style="font-family: 'JetBrains Mono', 'Menlo', 'Consolas', monospace; letter-spacing: 4px; text-align: center;" />
        <button class="logo-action" id="doVerifyCode" aria-label="verify"><img src="assets/logo.png" alt="" /></button>
        <div class="form-status" id="codeStatus"></div>
      </div>

      <span class="modal-close" id="authClose">close</span>
    </div>
  </div>

  <script>
    const EMAILJS_PUBLIC_KEY  = 'xEz9t78eBnnGH07jx';
    const EMAILJS_SERVICE_ID  = 'service_djzfort';
    const EMAILJS_TEMPLATE_ID = 'template_kqlf0h4';
    if (window.emailjs) emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }
    const TRACKS = shuffle([
      'assets/music/3HM.mp3', 'assets/music/BABIapk.mp3', 'assets/music/paris-1.mp3',
      'assets/music/rh042.mp3', 'assets/music/skinomakase-2025.mp3', 'assets/music/gakkeum.mp3',
      'assets/music/wolf-guide.mp3', 'assets/music/my-love-cantonese.mp3', 'assets/music/never-stop.mp3',
      'assets/music/banban.mp3', 'assets/music/bogwangdong-59.mp3', 'assets/music/good-day.mp3',
      'assets/music/sleep.mp3'
    ]);
    const DROP_LOCATIONS = [{ city: 'Seoul', name: 'N Seoul Tower 2F', lat: 37.5512, lon: 126.9882 }];

    const body = document.body;
    const itemsLayer = document.getElementById('itemsLayer');
    const linesLayer = document.getElementById('linesLayer');
    const logoWrap = document.getElementById('logoWrap');
    let viewState = 0;
    let icons = [], connectorLines = [];
    let isAuthenticated = false;

    // 모바일 감지 — 세로 화면 + 좁은 너비
    const IS_MOBILE = window.matchMedia('(max-width: 600px)').matches;

    // 카테고리 정의 — 모바일/데스크탑 분기
    // 데스크탑: 가로로 넓게 4방향 펼침
    // 모바일: 세로 화면에 맞게 4방향 압축, 아이콘 수 감소
    const categories = IS_MOBILE ? [
      { name: 'glove',     img: 'assets/glove.png',     count: 10, region: { xMin: 0.02, xMax: 0.32, yMin: 0.30, yMax: 0.70 }, color: '#555' },
      { name: 'accessory', img: 'assets/accessory.png', count: 10, region: { xMin: 0.68, xMax: 0.98, yMin: 0.30, yMax: 0.70 }, color: '#6fb5ff', locked: true },
      { name: 'tattoo',    img: 'assets/tattoo.png',    count: 9,  region: { xMin: 0.20, xMax: 0.80, yMin: 0.72, yMax: 0.95 }, color: '#ffd54a' },
      { name: 'headset',   img: 'assets/headset.png',   count: TRACKS.length, region: { xMin: 0.20, xMax: 0.80, yMin: 0.05, yMax: 0.28 }, color: '#6fd86f' }
    ] : [
      { name: 'glove',     img: 'assets/glove.png',     count: 33, region: { xMin: 0.05, xMax: 0.40, yMin: 0.25, yMax: 0.80 }, color: '#555' },
      { name: 'accessory', img: 'assets/accessory.png', count: 33, region: { xMin: 0.60, xMax: 0.95, yMin: 0.25, yMax: 0.80 }, color: '#6fb5ff', locked: true },
      { name: 'tattoo',    img: 'assets/tattoo.png',    count: 31, region: { xMin: 0.25, xMax: 0.75, yMin: 0.60, yMax: 0.95 }, color: '#ffd54a' },
      { name: 'headset',   img: 'assets/headset.png',   count: TRACKS.length, region: { xMin: 0.25, xMax: 0.75, yMin: 0.05, yMax: 0.35 }, color: '#6fd86f' }
    ];

    function buildIcons() {
      itemsLayer.innerHTML = ''; linesLayer.innerHTML = '';
      icons = []; connectorLines = [];
      const rect = itemsLayer.getBoundingClientRect();
      const w = rect.width, h = rect.height;
      const cx = w * 0.5, cy = h * 0.5;
      const minDist = IS_MOBILE ? 0.09 : 0.07;
      const centerAvoid = IS_MOBILE ? 0.12 : 0.17;
      const placed = [];
      let headsetTrackIdx = 0;

      categories.forEach(cat => {
        for (let i = 0; i < cat.count; i++) {
          let xn, yn, ok = false, attempts = 0;
          while (!ok && attempts < 50) {
            attempts++;
            xn = cat.region.xMin + Math.random() * (cat.region.xMax - cat.region.xMin);
            yn = cat.region.yMin + Math.random() * (cat.region.yMax - cat.region.yMin);
            if (Math.hypot(xn - 0.5, yn - 0.5) < centerAvoid) continue;
            let tooClose = false;
            for (const p of placed) { if (Math.hypot(xn - p.x, yn - p.y) < minDist) { tooClose = true; break; } }
            if (!tooClose) { ok = true; placed.push({ x: xn, y: yn }); }
          }
          if (!ok) continue;

          const div = document.createElement('div');
          div.className = 'icon';
          if (cat.locked) div.classList.add('locked');
          if (cat.name === 'headset') {
            div.classList.add('headset-icon');
            div.dataset.trackNum = String(headsetTrackIdx + 1).padStart(2, '0');
            div.dataset.trackIdx = headsetTrackIdx;
            headsetTrackIdx++;
          }
          div.style.left = (xn * 100) + '%';
          div.style.top = (yn * 100) + '%';
          const delay = (Math.random() * 0.5).toFixed(2);
          div.style.transitionDelay = delay + 's';
          div.dataset.category = cat.name;
          div.addEventListener('click', e => { e.stopPropagation(); handleIconClick(cat, div); });

          const img = document.createElement('img');
          img.src = cat.img; img.alt = cat.name;
          div.appendChild(img);
          itemsLayer.appendChild(div);
          icons.push(div);

          const lx2 = xn * w, ly2 = yn * h;
          const length = Math.hypot(lx2 - cx, ly2 - cy);
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', cx); line.setAttribute('y1', cy);
          line.setAttribute('x2', lx2); line.setAttribute('y2', ly2);
          line.setAttribute('stroke', cat.color);
          line.setAttribute('class', 'connector-line');
          line.style.strokeDasharray = length; line.style.strokeDashoffset = length;
          line.dataset.length = length; line.style.transitionDelay = delay + 's';
          linesLayer.appendChild(line);
          connectorLines.push(line);
        }
      });

      icons.forEach((el, idx) => {
        const tier = idx < icons.length / 2 ? 'tier1' : 'tier2';
        el.classList.add(tier);
        connectorLines[idx].dataset.tier = tier === 'tier1' ? '1' : '2';
      });
      activateLines();
    }

    function activateLines() {
      connectorLines.forEach(line => {
        const tier = line.dataset.tier;
        const show = (viewState === 1 && tier === '1') || (viewState === 2);
        line.style.opacity = show ? (tier === '1' ? 0.25 : 0.4) : 0;
        line.style.strokeDashoffset = show ? 0 : line.dataset.length;
      });
    }

    function changeState(next) {
      if (next === viewState || next < 0 || next > 2) return;
      const prev = viewState;
      viewState = next;
      body.className = body.className.replace(/state\d/g, '').trim();
      body.classList.add('state' + viewState);
      if (isAuthenticated) body.classList.add('authenticated');
      activateLines();
      applyAudioFilterForState(); // 줌 상태에 따라 음악 필터/볼륨 조절
      const map = { '01':'sndIntro', '12':'sndOutro', '21':'sndFinalHalf', '10':'sndFinalFull' };
      const sndId = map[`${prev}${next}`];
      if (sndId) {
        const snd = document.getElementById(sndId);
        if (snd) { snd.currentTime = 0; snd.volume = next < prev ? 0.4 : 0.7; snd.play().catch(() => {}); }
      }
    }

    function handleIconClick(cat, el) {
      if (cat.locked) { document.getElementById('accModal').classList.add('active'); return; }
      if (cat.name === 'glove')  { document.getElementById('gloveModal').classList.add('active'); renderGlobe(); return; }
      if (cat.name === 'tattoo') { document.getElementById('tattooModal').classList.add('active'); return; }
      if (cat.name === 'headset') { playTrack(parseInt(el.dataset.trackIdx, 10), el); return; }
    }

    // ===== Music + Web Audio (EQ filter for zoom, headset-icon toggle) =====
    const trackAudio = document.getElementById('trackAudio');
    let currentTrack = -1;
    let currentTrackEl = null;

    // Web Audio graph
    let audioCtx = null;
    let audioSource = null;
    let lowpassFilter = null;
    let gainNode = null;

    function initAudioGraph() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioSource = audioCtx.createMediaElementSource(trackAudio);
        lowpassFilter = audioCtx.createBiquadFilter();
        lowpassFilter.type = 'lowpass';
        lowpassFilter.frequency.value = 20000;
        lowpassFilter.Q.value = 0.7;
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 1.0;
        audioSource.connect(lowpassFilter);
        lowpassFilter.connect(gainNode);
        gainNode.connect(audioCtx.destination);
      } catch (e) {
        console.warn('Web Audio init failed', e);
      }
    }

    // viewState에 따라 음악 필터/볼륨 — state0 먹먹, state2 또렷
    function applyAudioFilterForState() {
      if (!audioCtx || !lowpassFilter || !gainNode) return;
      const now = audioCtx.currentTime;
      const RAMP = 0.8;
      let freq, vol;
      if (viewState === 0)      { freq = 800;   vol = 0.35; }
      else if (viewState === 1) { freq = 8000;  vol = 0.7; }
      else                      { freq = 20000; vol = 1.0; }
      lowpassFilter.frequency.cancelScheduledValues(now);
      lowpassFilter.frequency.setTargetAtTime(freq, now, RAMP / 3);
      gainNode.gain.cancelScheduledValues(now);
      gainNode.gain.setTargetAtTime(vol, now, RAMP / 3);
    }

    function stopCurrentTrack() {
      trackAudio.pause();
      trackAudio.currentTime = 0;
      if (currentTrackEl) currentTrackEl.classList.remove('playing');
      currentTrack = -1;
      currentTrackEl = null;
    }

    function playTrack(idx, el) {
      if (idx < 0 || idx >= TRACKS.length) return;
      // 같은 아이콘을 다시 눌렀으면 정지
      if (currentTrack === idx) { stopCurrentTrack(); return; }
      // 다른 아이콘 재생 중이면 그것 정지
      if (currentTrackEl) currentTrackEl.classList.remove('playing');
      currentTrack = idx;
      currentTrackEl = el || document.querySelector(`.headset-icon[data-track-idx="${idx}"]`);
      if (currentTrackEl) currentTrackEl.classList.add('playing');
      trackAudio.src = TRACKS[idx];
      initAudioGraph();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      applyAudioFilterForState();
      trackAudio.play().catch(err => console.warn('Audio play blocked:', err));
    }

    // 곡 끝나면 자동 정지 (다음 곡 자동재생 X)
    trackAudio.addEventListener('ended', stopCurrentTrack);

    // ===== D3 Globe =====
    let globeRotation = [-126, -37];
    let globeRendered = false;
    let worldData = null;

    async function renderGlobe() {
      const svg = d3.select('#globeSvg');
      svg.selectAll('*').remove();
      const width = 400, height = 400;
      const projection = d3.geoOrthographic().scale(180).translate([width/2, height/2]).clipAngle(90).rotate(globeRotation);
      const path = d3.geoPath(projection);

      svg.append('circle').attr('class', 'sphere').attr('cx', width/2).attr('cy', height/2).attr('r', 180);
      const graticule = d3.geoGraticule().step([20, 20]);
      svg.append('path').datum(graticule).attr('class', 'graticule').attr('d', path);

      if (!worldData) {
        try {
          const world = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json());
          worldData = topojson.feature(world, world.objects.countries);
        } catch (e) { console.warn('Map load failed', e); }
      }
      if (worldData) {
        svg.append('g').selectAll('path').data(worldData.features).join('path').attr('class', 'country').attr('d', path);
      }

      const pinsGroup = svg.append('g').attr('class', 'pins');
      function renderPins() {
        pinsGroup.selectAll('*').remove();
        DROP_LOCATIONS.forEach(loc => {
          // 뒤에 있는 핀은 안 보이게 — 회전된 위치가 가시 영역인지 확인
          const r = projection.rotate();
          const lambda = -r[0], phi = -r[1];
          const cosD = Math.sin(phi * Math.PI/180) * Math.sin(loc.lat * Math.PI/180) +
                       Math.cos(phi * Math.PI/180) * Math.cos(loc.lat * Math.PI/180) *
                       Math.cos((loc.lon - lambda) * Math.PI/180);
          if (cosD < 0) return; // 지구 뒤편
          const coords = projection([loc.lon, loc.lat]);
          if (!coords) return;
          pinsGroup.append('circle').attr('class', 'pin-pulse').attr('cx', coords[0]).attr('cy', coords[1]).attr('r', 3);
          pinsGroup.append('circle').attr('class', 'pin-dot').attr('cx', coords[0]).attr('cy', coords[1]).attr('r', 3);
        });
      }
      renderPins();

      let dragStart = null;
      const svgNode = svg.node();
      function onDragStart(e) {
        const x = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX);
        const y = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0].clientY);
        dragStart = { x, y, rot: [...globeRotation] };
      }
      function onDragMove(e) {
        if (!dragStart) return;
        e.preventDefault();
        const cx = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX);
        const cy = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0].clientY);
        const dx = cx - dragStart.x, dy = cy - dragStart.y;
        globeRotation = [dragStart.rot[0] + dx * 0.5, Math.max(-90, Math.min(90, dragStart.rot[1] - dy * 0.5))];
        projection.rotate(globeRotation);
        svg.select('.graticule').attr('d', path);
        svg.selectAll('.country').attr('d', path);
        renderPins();
      }
      function onDragEnd() { dragStart = null; }
      svgNode.addEventListener('mousedown', onDragStart);
      window.addEventListener('mousemove', onDragMove);
      window.addEventListener('mouseup', onDragEnd);
      svgNode.addEventListener('touchstart', onDragStart, { passive: true });
      window.addEventListener('touchmove', onDragMove, { passive: false });
      window.addEventListener('touchend', onDragEnd);
      globeRendered = true;
    }

    // ===== Events =====
    let wheelLock = false;
    window.addEventListener('wheel', (e) => {
      if (e.target.closest('.modal-overlay')) return;
      e.preventDefault();
      if (wheelLock) return;
      if (Math.abs(e.deltaY) < 10) return;
      wheelLock = true;
      setTimeout(() => { wheelLock = false; }, 700);
      e.deltaY > 0 ? changeState(viewState + 1) : changeState(viewState - 1);
    }, { passive: false });

    let touchStartDist = 0;
    window.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchStartDist = Math.hypot(dx, dy);
      }
    }, { passive: true });
    window.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && touchStartDist > 0) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const newDist = Math.hypot(dx, dy);
        const delta = newDist - touchStartDist;
        if (Math.abs(delta) > 50) {
          if (delta > 0) changeState(viewState + 1); else changeState(viewState - 1);
          touchStartDist = newDist;
        }
      }
    }, { passive: true });

    logoWrap.addEventListener('click', () => {
      if (viewState === 0) {
        changeState(1);
      } else if (viewState === 2) {
        if (isAuthenticated) window.open('https://hamasu1989.itch.io/skinomakasewebtest', '_blank');
        else document.getElementById('authModal').classList.add('active');
      } else {
        changeState(0);
      }
    });

    document.getElementById('gloveClose').addEventListener('click', () => document.getElementById('gloveModal').classList.remove('active'));
    document.getElementById('gloveVerify').addEventListener('click', () => {
      document.getElementById('gloveModal').classList.remove('active');
      document.getElementById('authModal').classList.add('active');
    });
    document.getElementById('tattooClose').addEventListener('click', () => document.getElementById('tattooModal').classList.remove('active'));
    document.getElementById('accClose').addEventListener('click', () => document.getElementById('accModal').classList.remove('active'));
    document.getElementById('authClose').addEventListener('click', () => document.getElementById('authModal').classList.remove('active'));

    document.getElementById('tatSubmit').addEventListener('click', async () => {
      const name = document.getElementById('tatName').value.trim();
      const email = document.getElementById('tatEmail').value.trim();
      const loc = document.getElementById('tatLoc').value.trim();
      const desc = document.getElementById('tatDesc').value.trim();
      const status = document.getElementById('tatStatus');
      const btn = document.getElementById('tatSubmit');
      if (!name || !email || !desc) { status.textContent = 'Name, email, and description required.'; status.className = 'form-status error'; return; }
      btn.disabled = true; status.textContent = 'Sending...'; status.className = 'form-status';
      try {
        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          name, email,
          tattoo_url: 'https://placehold.co/400x200?text=Tattoo+Inquiry',
          vision_analysis: `TATTOO INQUIRY\n\nLocation: ${loc || '(any)'}\n\nIdea:\n${desc}`
        });
        status.textContent = 'Inquiry sent. Reply within a few days.';
        status.className = 'form-status success';
        ['tatName','tatEmail','tatLoc','tatDesc'].forEach(id => document.getElementById(id).value = '');
      } catch (e) {
        console.error(e);
        status.textContent = 'Failed. DM @jinjinneedle instead.';
        status.className = 'form-status error';
      } finally { btn.disabled = false; }
    });

    document.getElementById('doRequest').addEventListener('click', async () => {
      const name = document.getElementById('reqName').value.trim();
      const email = document.getElementById('reqEmail').value.trim();
      const photo = document.getElementById('reqPhoto').files[0];
      const note = document.getElementById('reqNote').value.trim();
      const status = document.getElementById('reqStatus');
      const btn = document.getElementById('doRequest');
      if (!name || !email || !photo) { status.textContent = 'Name, email, and tattoo photo required.'; status.className = 'form-status error'; return; }
      if (photo.size > 4 * 1024 * 1024) { status.textContent = 'Photo too large (max 4MB).'; status.className = 'form-status error'; return; }
      btn.disabled = true; status.textContent = 'Sending...'; status.className = 'form-status';
      try {
        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          name, email,
          tattoo_url: 'https://placehold.co/400x300?text=Photo+pending+(reply+to+request)',
          vision_analysis: `ACCESS REQUEST — CORE\n\nNote: ${note || '(none)'}\nPhoto: ${(photo.size/1024).toFixed(0)}KB ${photo.type}\nReply to user for the original photo.`
        });
        status.textContent = 'Submitted. Check your inbox in 24-48h.';
        status.className = 'form-status success';
        ['reqName','reqEmail','reqPhoto','reqNote'].forEach(id => document.getElementById(id).value = '');
      } catch (e) {
        console.error(e);
        status.textContent = 'Failed. DM @jinjinneedle.';
        status.className = 'form-status error';
      } finally { btn.disabled = false; }
    });

    // ============================================================
    // ACCESS CODE SYSTEM (β-1)
    // ============================================================
    // Jin이 신청자에게 발급한 코드들 — 신청 확인 후 여기 추가하고 push
    const APPROVED_CODES = [
      // 예시: 'M-A8K3FQ',
      //       'M-9XPL2D',
    ];

    function setMarked(on, code) {
      if (on) {
        isAuthenticated = true;
        body.classList.add('marked');
        body.classList.add('authenticated');
        if (code) localStorage.setItem('skm_marked', code);
      } else {
        isAuthenticated = false;
        body.classList.remove('marked');
        body.classList.remove('authenticated');
        localStorage.removeItem('skm_marked');
      }
    }

    // 탭 전환
    document.querySelectorAll('.auth-tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(x => x.classList.toggle('active', x === t));
        const tab = t.dataset.tab;
        document.getElementById('pane-request').style.display = tab === 'request' ? 'block' : 'none';
        document.getElementById('pane-enter').style.display = tab === 'enter' ? 'block' : 'none';
      });
    });

    // 코드 검증
    document.getElementById('doVerifyCode').addEventListener('click', () => {
      const code = document.getElementById('codeInput').value.trim().toUpperCase();
      const status = document.getElementById('codeStatus');
      if (!code) { status.textContent = 'enter your code.'; status.className = 'form-status error'; return; }
      if (APPROVED_CODES.includes(code)) {
        setMarked(true, code);
        status.textContent = 'marked.';
        status.className = 'form-status success';
        setTimeout(() => {
          document.getElementById('authModal').classList.remove('active');
        }, 900);
      } else {
        status.textContent = 'invalid code.';
        status.className = 'form-status error';
      }
    });

    // 페이지 로드 시 저장된 코드 복원
    (function restoreMarked() {
      const saved = localStorage.getItem('skm_marked');
      if (saved && APPROVED_CODES.includes(saved)) {
        setMarked(true);
      }
    })();

    window.addEventListener('load', buildIcons);
    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(buildIcons, 200); });
  </script>
